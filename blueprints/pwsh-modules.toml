schema = 1
name = "pwsh-modules"
description = "PowerShell modules from PSGallery (PSReadLine, ...) — per-user, no UAC"

# Demonstrates the `pwsh-module:` source scheme (luban v0.4.1+) plus the
# bp-source-relative `bp:` post_install (v0.2.x). All tools here:
#   - download from https://www.powershellgallery.com (the official
#     PSGallery NuGet feed)
#   - skip the PATH shim (no_shim = true; PowerShell modules go to
#     $PSModulePath, not PATH)
#   - run scripts/install-pwsh-module.ps1 to copy the extracted module
#     files into ~/Documents/PowerShell/Modules/<Name>/<Version>/
#
# `version` is required for v0.4.1 — auto-latest landing in v0.4.x. Find
# current versions at https://www.powershellgallery.com/packages/<Name>.
#
# To add another module, copy a [tool.X] block and update name + version.
# Same script handles them all (it reads name + version from the .psd1
# manifest at the .nupkg root).

[tool.psreadline]
source = "pwsh-module:PSReadLine"
version = "2.4.0"
no_shim = true
bin = "PSReadLine.psd1"
post_install = "bp:scripts/install-pwsh-module.ps1"

